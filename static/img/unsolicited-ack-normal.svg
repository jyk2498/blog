<svg width="100%" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="normTitle normDesc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title id="normTitle">Unsolicited ACK, normal case</title>
<desc id="normDesc">Requester and responder exchange a READ request, three READ responses for PSN 100 to 102, and an unsolicited ACK carrying PSN 102 which the requester safely absorbs as a credit-only packet. Arrows are slanted to show propagation delay.</desc>
<defs>
<marker id="arrN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="120" y="30" width="160" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="200" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Requester (A)</text>
<rect x="400" y="30" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Responder (B)</text>

<line x1="200" y1="70" x2="200" y2="440" stroke="#888780" stroke-width="0.5"/>
<line x1="480" y1="70" x2="480" y2="440" stroke="#888780" stroke-width="0.5"/>

<text x="340" y="100" text-anchor="middle" font-size="12" fill="#9a988f">READ request 100–102</text>
<line x1="200" y1="110" x2="480" y2="130" stroke="#378ADD" stroke-width="1" marker-end="url(#arrN)"/>

<text x="340" y="164" text-anchor="middle" font-size="12" fill="#9a988f">READ response PSN 100</text>
<line x1="480" y1="174" x2="200" y2="194" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrN)"/>
<text x="340" y="214" text-anchor="middle" font-size="12" fill="#9a988f">READ response PSN 101</text>
<line x1="480" y1="224" x2="200" y2="244" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrN)"/>
<text x="340" y="264" text-anchor="middle" font-size="12" fill="#9a988f">READ response PSN 102</text>
<line x1="480" y1="274" x2="200" y2="294" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrN)"/>

<text x="150" y="312" text-anchor="middle" font-size="12" fill="#9a988f">ePSN = 103</text>

<text x="340" y="326" text-anchor="middle" font-size="12" fill="#9a988f">Unsolicited ACK PSN 102</text>
<line x1="480" y1="336" x2="200" y2="356" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrN)"/>

<rect x="70" y="380" width="540" height="66" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="90" y="404" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Handled correctly</text>
<text x="90" y="426" dominant-baseline="central" font-size="12" fill="#854F0B">READ already complete — ACK just refreshes credit and MSN, then absorbed</text>
</svg>
