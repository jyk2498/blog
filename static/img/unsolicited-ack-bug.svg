<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bugTitle bugDesc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title id="bugTitle">Unsolicited ACK, bug case</title>
<desc id="bugDesc">A READ request for PSN 100 to 103 where responses 102 and 103 are dropped mid-flight, leaving expected-PSN at 102. An unsolicited ACK carrying PSN 103 then arrives ahead of expected-PSN and inside the READ range, which the requester misreads as an implied NAK, wedging the queue pair.</desc>
<defs>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="120" y="30" width="160" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="200" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Requester (A)</text>
<rect x="400" y="30" width="160" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Responder (B)</text>

<line x1="200" y1="70" x2="200" y2="510" stroke="#888780" stroke-width="0.5"/>
<line x1="480" y1="70" x2="480" y2="510" stroke="#888780" stroke-width="0.5"/>

<text x="340" y="100" text-anchor="middle" font-size="12" fill="#9a988f">READ request 100–103</text>
<line x1="200" y1="110" x2="480" y2="130" stroke="#378ADD" stroke-width="1" marker-end="url(#arrB)"/>

<text x="340" y="162" text-anchor="middle" font-size="12" fill="#9a988f">READ response PSN 100</text>
<line x1="480" y1="172" x2="200" y2="192" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrB)"/>
<text x="340" y="210" text-anchor="middle" font-size="12" fill="#9a988f">READ response PSN 101</text>
<line x1="480" y1="220" x2="200" y2="240" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrB)"/>

<line x1="480" y1="268" x2="360" y2="286" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="352" y1="280" x2="368" y2="292" stroke="#A32D2D" stroke-width="1.5"/>
<line x1="368" y1="280" x2="352" y2="292" stroke="#A32D2D" stroke-width="1.5"/>
<text x="430" y="262" text-anchor="middle" font-size="12" fill="#A32D2D">PSN 102 dropped</text>

<line x1="480" y1="308" x2="360" y2="326" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="352" y1="320" x2="368" y2="332" stroke="#A32D2D" stroke-width="1.5"/>
<line x1="368" y1="320" x2="352" y2="332" stroke="#A32D2D" stroke-width="1.5"/>
<text x="430" y="302" text-anchor="middle" font-size="12" fill="#A32D2D">PSN 103 dropped</text>

<text x="150" y="320" text-anchor="middle" font-size="12" fill="#9a988f">ePSN = 102</text>

<text x="340" y="348" text-anchor="middle" font-size="12" fill="#9a988f">Unsolicited ACK PSN 103</text>
<line x1="480" y1="358" x2="200" y2="378" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrB)"/>

<rect x="70" y="400" width="540" height="102" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="90" y="424" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Misread as implied NAK</text>
<text x="90" y="446" dominant-baseline="central" font-size="12" fill="#A32D2D">PSN 103 is ahead of ePSN (102) and inside the READ range</text>
<text x="90" y="466" dominant-baseline="central" font-size="12" fill="#A32D2D">Spurious retransmission triggered; completion count advanced off MSN</text>
<text x="90" y="486" dominant-baseline="central" font-size="12" fill="#A32D2D">Queue pair wedges</text>
</svg>
